# SINFACTURA canonical label set
# Source of truth: sinfactura/.github/.github/labels.yml
# Synced to all org repos by .github/workflows/sync-labels.yml
#
# Format compatible with `github-label-sync` (npm).
# https://github.com/Financial-Times/github-label-sync
#
# Rule: every issue at creation must have at minimum
#   one type:*, one priority (P0-P3), and one area:*
# CI in each repo enforces this via a simple Action (see docs/cockpit/workflows/enforce-labels.yml).

# ─── TYPE (exactly one) ──────────────────────────────────────────────
- name: "type:bug"
  color: "d73a4a"
  description: "Something is broken"
- name: "type:feature"
  color: "0e8a16"
  description: "New capability or enhancement"
- name: "type:refactor"
  color: "5319e7"
  description: "Code restructuring without behavior change"
- name: "type:chore"
  color: "c2e0c6"
  description: "Tooling, deps, CI, maintenance"
- name: "type:docs"
  color: "1d76db"
  description: "Documentation changes"
- name: "type:epic"
  color: "3e4b9e"
  description: "Container for a theme — has sub-issues"
- name: "type:spike"
  color: "bfd4f2"
  description: "Timeboxed investigation / research"

# ─── PRIORITY (exactly one) ──────────────────────────────────────────
- name: "P0: launch-blocker"
  color: "b60205"
  description: "Blocks launch or production right now"
- name: "P1: this-sprint"
  color: "d93f0b"
  description: "Must land this sprint/week"
- name: "P2: this-quarter"
  color: "fbca04"
  description: "Target this quarter"
- name: "P3: someday"
  color: "d4c5f9"
  description: "Nice to have; no committed date"

# ─── AREA (one or more) ──────────────────────────────────────────────
- name: "area:auth"
  color: "bfdadc"
  description: "Authentication, registration, RBAC"
- name: "area:billing"
  color: "bfdadc"
  description: "Subscriptions, Stripe, entitlements"
- name: "area:invoices"
  color: "bfdadc"
  description: "AFIP/ARCA, invoice lifecycle, CAEA"
- name: "area:orders"
  color: "bfdadc"
  description: "Order processing, fulfillment"
- name: "area:customers"
  color: "bfdadc"
  description: "Customer management, CRM entities"
- name: "area:suppliers"
  color: "bfdadc"
  description: "Supplier management, purchase orders"
- name: "area:inventory"
  color: "bfdadc"
  description: "Stock, warehouses, movements"
- name: "area:reports"
  color: "bfdadc"
  description: "Reporting, BI, exports"
- name: "area:print"
  color: "bfdadc"
  description: "CloudPrint / print service"
- name: "area:integrations"
  color: "bfdadc"
  description: "MercadoPago, WhatsApp, Stripe, ARCA, 3rd-party"
- name: "area:ux"
  color: "bfdadc"
  description: "UI/UX polish, accessibility"
- name: "area:perf"
  color: "bfdadc"
  description: "Performance, bundle size, speed"
- name: "area:security"
  color: "bfdadc"
  description: "Security hardening, compliance"
- name: "area:ops"
  color: "bfdadc"
  description: "Runbooks, incident response, support tooling"
- name: "area:infra"
  color: "bfdadc"
  description: "CI/CD, AWS, Firebase, deployment"
- name: "area:marketing"
  color: "bfdadc"
  description: "Landing page, campaigns, copy"
- name: "area:mobile"
  color: "bfdadc"
  description: "Mobile app, React Native"

# ─── STATUS SIGNALS (optional, any number) ───────────────────────────
- name: "needs-triage"
  color: "e4e669"
  description: "Not yet categorized; missing type/priority/area"
- name: "needs-design"
  color: "e4e669"
  description: "Design/spec work required before implementation"
- name: "needs-repro"
  color: "e4e669"
  description: "Bug report without reliable reproduction steps"
- name: "blocked"
  color: "d93f0b"
  description: "Waiting on external dependency or another issue"
- name: "good-first-issue"
  color: "7057ff"
  description: "Good entry point for a new contributor"
- name: "source:customer"
  color: "006b75"
  description: "Raised by or affecting a paying customer"
- name: "closed-as-stale"
  color: "cccccc"
  description: "Closed after >60 days with no activity; reopen with context"
- name: "help-wanted"
  color: "008672"
  description: "Extra attention is needed"
- name: "duplicate"
  color: "cfd3d7"
  description: "This issue or PR already exists"
- name: "wontfix"
  color: "ffffff"
  description: "This will not be worked on"
